<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام استحقاق دعم صندوق التكافل الاجتماعي - للطلاب</title>
    <!-- المكتبات الخارجية -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- ربط ملف CSS الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container year-1" id="mainContainer">
    <h1>🎓 تحديد استحقاق دعم صندوق التكافل الاجتماعي (الطلاب)</h1>

    <!-- نموذج الإدخال -->
    <form id="supportForm">
        <label>الاسم الكامل: <input type="text" id="name" required placeholder="أدخل الاسم"></label>
        <label>رقم التليفون: <input type="tel" id="phone" required placeholder="11 رقم" pattern="[0-9]{11}"></label>
        <label>الرقم القومي: <input type="text" id="nationalID" required placeholder="14 رقم" pattern="[0-9]{14}"></label>
        <label>الحيازة الزراعية (فدان): <input type="number" id="land" min="0" value="0" step="0.1"></label>
        <label>عدد أفراد الأسرة: <input type="number" id="familyMembers" min="1" value="1" required></label>
        <label>دخل الأسرة الشهري (جنيه): <input type="number" id="familyIncome" min="0" value="0" required></label>
        <label>الحد الأدنى لنصيب الفرد (جنيه): <input type="number" id="minIncome" min="0" value="500" required></label>
        <label>الفرقة الدراسية:
            <select id="yearSelect">
                <option value="firstYear">الفرقة الأولى</option>
                <option value="secondYear">الفرقة الثانية</option>
                <option value="thirdYear">الفرقة الثالثة</option>
                <option value="fourthYear">الفرقة الرابعة</option>
                <option value="fifthYear">الفرقة الخامسة</option>
            </select>
        </label>
        <div style="grid-column: span 2; display: flex; gap: 10px;">
            <button type="button" id="addBtn" class="btn-success">➕ إضافة / تحديث</button>
            <button type="button" id="cancelEditBtn" style="background:#6c757d;">❌ إلغاء التعديل</button>
        </div>
    </form>

    <div id="result"></div>

    <!-- إحصائيات سريعة -->
    <div class="stats">
        <div class="stat-card">📊 إجمالي الطلاب: <span id="totalCount">0</span></div>
        <div class="stat-card">✅ المستحقون: <span id="eligibleCount">0</span></div>
        <div class="stat-card">❌ غير المستحقين: <span id="notEligibleCount">0</span></div>
        <div class="stat-card">📈 نسبة الاستحقاق: <span id="eligibilityPercent">0</span>%</div>
    </div>

    <!-- أزرار السنوات الدراسية -->
    <div class="year-buttons">
        <button data-year="firstYear">الفرقة الأولى</button>
        <button data-year="secondYear">الفرقة الثانية</button>
        <button data-year="thirdYear">الفرقة الثالثة</button>
        <button data-year="fourthYear">الفرقة الرابعة</button>
        <button data-year="fifthYear">الفرقة الخامسة</button>
    </div>

    <!-- شريط الأدوات -->
    <div class="toolbar">
        <button onclick="exportToExcel()">📎 تصدير Excel</button>
        <button onclick="exportToPDF()">📄 تصدير PDF</button>
        <button onclick="printTable()">🖨️ طباعة الجدول</button>
        <button onclick="exportToJSON()">📁 تصدير JSON</button>
        <input type="file" id="importJSON" accept=".json" style="display:none">
        <button onclick="document.getElementById('importJSON').click()">📂 استيراد JSON</button>
        <button onclick="clearAllData()" class="btn-danger">🗑️ مسح كل البيانات</button>
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="🔍 بحث بالاسم، التليفون، الرقم القومي..." oninput="filterTable()">
        <button onclick="toggleDropdown()">📋 إخفاء/إظهار القائمة</button>
        <button onclick="toggleTable()">👁️ إخفاء/إظهار الجدول</button>
    </div>

    <!-- قائمة منسدلة -->
    <select id="recordsDropdown" size="5" onchange="showSelectedRecord()"></select>

    <!-- جدول البيانات -->
    <div style="overflow-x: auto;" id="tableWrapper">
        <table id="dataTable">
            <thead>
                <tr><th>الاسم</th><th>التليفون</th><th>الرقم القومي</th><th>الحيازة (فدان)</th><th>عدد الأسرة</th><th>دخل الأسرة</th><th>نصيب الفرد</th><th>الحد الأدنى</th><th>الاستحقاق</th><th>إجراءات</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<!-- ربط ملف JavaScript الخارجي -->
<script src="script.js"></script>
</body>
</html>
